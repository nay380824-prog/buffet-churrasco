name: Keep Supabase Alive

# Roda a cada 5 dias automaticamente
on:
  schedule:
    - cron: '0 10 */5 * *'   # às 10h UTC a cada 5 dias
  workflow_dispatch:           # permite rodar manualmente também

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/eventos_buffet?select=id&limit=1"
          echo "✅ Supabase acordado com sucesso"
